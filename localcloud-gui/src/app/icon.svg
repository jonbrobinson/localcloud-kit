<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- ① Cloud — top center -->
  <g fill="white">
    <circle cx="32" cy="14" r="8"/>
    <circle cx="19" cy="19" r="6"/>
    <circle cx="45" cy="19" r="6"/>
    <rect x="13" y="18" width="38" height="10" rx="5"/>
  </g>

  <!-- ② Envelope — bottom left -->
  <!-- clear rectangle body -->
  <rect x="5" y="34" width="26" height="20" rx="1.5" fill="white"/>
  <!-- flap V line -->
  <path d="M5,34.5 L18,44 L31,34.5" fill="none" stroke="#3730a3" stroke-opacity="0.3" stroke-width="2" stroke-linejoin="round"/>

  <!-- ③ Shield — bottom right, identity / IAM -->
  <path d="M47,57 C35,51 35,45 35,38 C35,31 38,30 47,30 C56,30 59,31 59,38 C59,45 59,51 47,57 Z" fill="white"/>
  <!-- checkmark inside -->
  <path d="M40,43 L45,49 L55,37" fill="none" stroke="#3730a3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

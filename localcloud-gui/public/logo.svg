<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shine" x1="210" y1="-120" x2="515" y2="505" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.05"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect width="700" height="400" rx="28" fill="#1B3A8C"/>
  <!-- Subtle gradient shine -->
  <rect width="700" height="400" rx="28" fill="url(#shine)"/>

  <!-- Inset framing brackets — frame spans x:118–582, y:108–292 -->
  <!-- arm length: 48px, stroke: 5.5px -->

  <!-- Top-left bracket -->
  <polyline points="166,108 118,108 118,156" stroke="white" stroke-width="5.5" stroke-linecap="square" fill="none"/>
  <!-- Top-right bracket -->
  <polyline points="534,108 582,108 582,156" stroke="white" stroke-width="5.5" stroke-linecap="square" fill="none"/>
  <!-- Bottom-left bracket -->
  <polyline points="166,292 118,292 118,244" stroke="white" stroke-width="5.5" stroke-linecap="square" fill="none"/>
  <!-- Bottom-right bracket -->
  <polyline points="534,292 582,292 582,244" stroke="white" stroke-width="5.5" stroke-linecap="square" fill="none"/>

  <!-- Cloud — centered at (197, 200) -->
  <g fill="white">
    <circle cx="197" cy="177" r="39"/>
    <circle cx="162" cy="202" r="27"/>
    <circle cx="232" cy="202" r="27"/>
    <rect x="135" y="194" width="124" height="44" rx="22"/>
  </g>

  <!-- Envelope — centered at (350, 200) -->
  <rect x="287" y="155" width="126" height="90" rx="9" fill="white"/>
  <path d="M287,161 L350,207 L413,161"
        fill="none" stroke="#1B3A8C" stroke-width="10"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Shield — centered at (503, 208) -->
  <path d="M503,148 L555,160 L555,198 C555,234 530,254 503,268 C476,254 451,234 451,198 L451,160 Z"
        fill="white"/>
</svg>

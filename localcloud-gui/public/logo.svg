<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shine/depth gradient overlay (scaled from 424×224 to 700×400) -->
    <linearGradient id="shine" x1="210" y1="-120" x2="515" y2="505" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.05"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect width="700" height="400" rx="24" fill="#1B3A8C"/>
  <!-- Gradient shine overlay -->
  <rect width="700" height="400" rx="24" fill="url(#shine)"/>

  <!-- Corner brackets — top-left -->
  <polyline points="35,100 35,35 100,35" stroke="white" stroke-width="6" stroke-linecap="square" fill="none"/>
  <!-- Corner brackets — top-right -->
  <polyline points="665,100 665,35 600,35" stroke="white" stroke-width="6" stroke-linecap="square" fill="none"/>
  <!-- Corner brackets — bottom-left -->
  <polyline points="35,300 35,365 100,365" stroke="white" stroke-width="6" stroke-linecap="square" fill="none"/>
  <!-- Corner brackets — bottom-right -->
  <polyline points="665,300 665,365 600,365" stroke="white" stroke-width="6" stroke-linecap="square" fill="none"/>

  <!-- ① Cloud — centered at (175, 195) -->
  <g fill="white">
    <!-- top dome -->
    <circle cx="175" cy="170" r="44"/>
    <!-- left lobe -->
    <circle cx="136" cy="198" r="30"/>
    <!-- right lobe -->
    <circle cx="214" cy="198" r="30"/>
    <!-- base rectangle to fill gaps -->
    <rect x="106" y="190" width="138" height="48" rx="24"/>
  </g>

  <!-- ② Envelope — centered at (350, 200) -->
  <!-- Body -->
  <rect x="286" y="152" width="128" height="90" rx="10" fill="white"/>
  <!-- Flap chevron (dark blue) -->
  <path d="M286,157 L350,207 L414,157" fill="none" stroke="#1B3A8C" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ③ Shield — centered at (525, 200) -->
  <path d="
    M525,255
    C486,238 474,220 474,192
    C474,163 488,152 525,152
    C562,152 576,163 576,192
    C576,220 564,238 525,255
    Z
  " fill="white"/>
</svg>

    <circle cx="18" cy="24" r="3.5"/>
    <circle cx="32" cy="24" r="3.5"/>
    <rect x="14" y="23" width="22" height="8" rx="4"/>
  </g>

  <!-- separator -->
  <circle cx="43" cy="24" r="1.5" fill="white" opacity="0.3"/>


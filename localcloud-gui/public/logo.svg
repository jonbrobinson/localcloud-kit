<svg width="96" height="48" viewBox="0 0 96 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="96" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="96" height="48" rx="10" fill="url(#bg)"/>

  <!-- Top cloud (smaller, faded) -->
  <g opacity="0.5" fill="white">
    <circle cx="24" cy="13" r="6"/>
    <circle cx="15" cy="17" r="4.5"/>
    <circle cx="33" cy="17" r="4.5"/>
    <rect x="10" y="16" width="28" height="7" rx="3.5"/>
  </g>

  <!-- Bottom cloud (full opacity) -->
  <g fill="white">
    <circle cx="24" cy="32" r="7.5"/>
    <circle cx="13" cy="37" r="6"/>
    <circle cx="35" cy="37" r="6"/>
    <rect x="7" y="36" width="34" height="8" rx="4"/>
  </g>

  <!-- Divider -->
  <line x1="52" y1="8" x2="52" y2="40" stroke="white" stroke-opacity="0.2" stroke-width="1"/>

  <!-- LCK monogram -->
  <text
    x="74" y="24"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="17"
    letter-spacing="3"
    fill="white"
  >LCK</text>
</svg>

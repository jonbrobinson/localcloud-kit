<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Top cloud — small, faded -->
  <g opacity="0.35" fill="white">
    <circle cx="32" cy="10" r="6"/>
    <circle cx="22" cy="14" r="4"/>
    <circle cx="42" cy="14" r="4"/>
    <rect x="18" y="13" width="28" height="7" rx="3.5"/>
  </g>

  <!-- Middle cloud — medium opacity -->
  <g opacity="0.65" fill="white">
    <circle cx="32" cy="30" r="7"/>
    <circle cx="20" cy="34" r="5.5"/>
    <circle cx="44" cy="34" r="5.5"/>
    <rect x="14" y="33" width="36" height="8" rx="4"/>
  </g>

  <!-- Bottom cloud — full opacity, largest -->
  <g fill="white">
    <circle cx="32" cy="52" r="8"/>
    <circle cx="18" cy="56" r="7"/>
    <circle cx="46" cy="56" r="7"/>
    <rect x="11" y="55" width="42" height="8" rx="4"/>
  </g>
</svg>

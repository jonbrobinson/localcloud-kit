services:
  # Traefik Entry Point
  traefik:
    image: traefik:v3
    container_name: traefik
    ports:
      - "3030:3030"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/certs:/certs:ro
    networks:
      - localstack-network
    restart: unless-stopped

  # LocalStack - AWS Services Emulation
  localstack:
    image: localstack/localstack:${LOCALSTACK_VERSION:-latest}
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,lambda,apigateway,iam,secretsmanager,ssm
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - "./volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - localstack-network

  # Next.js GUI Application (with hot reload)
  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: localcloud-gui
    environment:
      - PORT=3030
    volumes:
      - ./localcloud-gui:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - localstack-network
    restart: unless-stopped
    command: npm run dev

  # Express.js API Server (with hot reload)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: localcloud-api
    ports:
      - "3031:3031"
    environment:
      - PORT=3031
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./localcloud-api:/app
      - /app/node_modules
      - ./logs:/app/logs
      - ./scripts:/app/scripts
      - localcloud-data:/app/data
    depends_on:
      - localstack
    networks:
      - localstack-network
    restart: unless-stopped
    command: npm run dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: localstack-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gui
      - api
      - localstack
    networks:
      - localstack-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.localcloud.rule=Host(`app-local.localcloudkit.com`)"
      - "traefik.http.routers.localcloud.entrypoints=websecure"
      - "traefik.http.routers.localcloud.tls=true"
      - "traefik.http.services.localcloud.loadbalancer.server.port=80"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: localcloud-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=localcloud
      - POSTGRES_PASSWORD=localcloud
      - POSTGRES_DB=localcloud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - localstack-network
    restart: unless-stopped

  # pgAdmin - PostgreSQL Web GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: localcloud-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@localcloud.dev
      - PGADMIN_DEFAULT_PASSWORD=localcloud
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    depends_on:
      - postgres
    networks:
      - localstack-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.localcloudkit.com`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

  # Keycloak - Identity & Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: localcloud-keycloak
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME=https://keycloak.localcloudkit.com:3030
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    command: start-dev
    tmpfs:
      - /tmp
    networks:
      - localstack-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.localcloudkit.com`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  # Redis Cache (standalone)
  redis:
    image: redis:7-alpine
    container_name: localcloud-redis
    ports:
      - "6380:6379"
    networks:
      - localstack-network
    restart: unless-stopped

  # Mailpit - Local Email Testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: localcloud-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI (direct access)
    networks:
      - localstack-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mailpit.localcloudkit.com`)"
      - "traefik.http.routers.mailpit.entrypoints=websecure"
      - "traefik.http.routers.mailpit.tls=true"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"

networks:
  localstack-network:
    driver: bridge

volumes:
  localstack_data:
  localcloud-data:
  postgres_data:

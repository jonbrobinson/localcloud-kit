services:
  # Traefik Entry Point
  traefik:
    image: traefik:v3
    container_name: traefik
    ports:
      - "${APP_PORT:-3030}:3030"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/certs:/certs:ro
    networks:
      - lck-network
    restart: unless-stopped

  # AWS Emulator - MiniStack (drop-in LocalStack replacement, no account required)
  # Port overrides for running alongside other projects:
  #   EMULATOR_PORT=4567 docker compose up        → changes host-side AWS emulator port
  #   RDS_BASE_PORT=15500 docker compose up        → shifts RDS instance ports up
  #   ELASTICACHE_BASE_PORT=16400 docker compose up → shifts ElastiCache ports up
  aws-emulator:
    image: nahuelnucera/ministack:${MINISTACK_VERSION:-latest}
    container_name: aws-emulator
    ports:
      - "${EMULATOR_PORT:-4566}:4566"
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - RDS_BASE_PORT=${RDS_BASE_PORT:-15432}
      - ELASTICACHE_BASE_PORT=${ELASTICACHE_BASE_PORT:-16379}
    volumes:
      - "./volume:/app/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - lck-network

  # Next.js GUI Application (with hot reload)
  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: localcloud-gui
    environment:
      - PORT=3030
    volumes:
      - ./localcloud-gui:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - lck-network
    restart: unless-stopped
    command: npm run dev

  # Express.js API Server (with hot reload)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: localcloud-api
    ports:
      - "3031:3031"
    environment:
      - PORT=3031
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./localcloud-api:/app
      - /app/node_modules
      - ./logs:/app/logs
      - ./scripts:/app/scripts
      - localcloud-data:/app/data
    depends_on:
      - aws-emulator
    networks:
      - lck-network
    restart: unless-stopped
    command: npm run dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: localstack-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gui
      - api
      - aws-emulator
    networks:
      - lck-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.localcloud.rule=Host(`app-local.localcloudkit.com`)"
      - "traefik.http.routers.localcloud.entrypoints=websecure"
      - "traefik.http.routers.localcloud.tls=true"
      - "traefik.http.services.localcloud.loadbalancer.server.port=80"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: localcloud-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=localcloud
      - POSTGRES_PASSWORD=localcloud
      - POSTGRES_DB=localcloud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lck-network
    restart: unless-stopped

  # pgAdmin - PostgreSQL Web GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: localcloud-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@localcloud.dev
      - PGADMIN_DEFAULT_PASSWORD=localcloud
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    depends_on:
      - postgres
    networks:
      - lck-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.localcloudkit.com`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

  # Keycloak - Identity & Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: localcloud-keycloak
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME=https://keycloak.localcloudkit.com:${APP_PORT:-3030}
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HEALTH_ENABLED=true
    command: start-dev
    tmpfs:
      - /tmp
    networks:
      - lck-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.localcloudkit.com`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  # Redis Cache (standalone)
  redis:
    image: redis:7-alpine
    container_name: localcloud-redis
    ports:
      - "6380:6379"
    networks:
      - lck-network
    restart: unless-stopped

  # Mailpit - Local Email Testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: localcloud-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI (direct access)
    networks:
      - lck-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mailpit.localcloudkit.com`)"
      - "traefik.http.routers.mailpit.entrypoints=websecure"
      - "traefik.http.routers.mailpit.tls=true"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"

  # PostHog Stack (product analytics)
  # NOTE: PostHog services are disabled (profile-gated). Run with --profile posthog to enable.
  posthog-postgres:
    image: postgres:16-alpine
    container_name: localcloud-posthog-postgres
    profiles: ["posthog"]
    environment:
      - POSTGRES_USER=posthog
      - POSTGRES_PASSWORD=posthog
      - POSTGRES_DB=posthog
    volumes:
      - posthog_postgres_data:/var/lib/postgresql/data
    networks:
      - lck-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthog"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  posthog-redis:
    # Use 7.4+ so existing volumes with RDB format version 12 (AOF base file) load without "Can't handle RDB format version 12"
    image: redis:7.4-alpine
    container_name: localcloud-posthog-redis
    profiles: ["posthog"]
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - posthog_redis_data:/data
    networks:
      - lck-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  posthog-zookeeper:
    image: zookeeper:3.7.0
    container_name: localcloud-posthog-zookeeper
    profiles: ["posthog"]
    environment:
      # Allow ruok so the healthcheck (echo ruok | nc ... | grep imok) can succeed
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok
    volumes:
      - posthog_zookeeper_data:/data
      - posthog_zookeeper_datalog:/datalog
      - posthog_zookeeper_logs:/logs
    networks:
      - lck-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  posthog-clickhouse:
    # Pin to 25.10: 24.8 lacks DateTime64-in-TTL (document_embeddings migration); 26.x
    # drops/renames system.crash_log (custom_metrics_server_crash view migration). 25.10 has both.
    image: clickhouse/clickhouse-server:25.10
    container_name: localcloud-posthog-clickhouse
    profiles: ["posthog"]
    # Match data volume owner so ClickHouse does not throw MISMATCHING_USERS_FOR_PROCESS_AND_DATA (430)
    user: "101:101"
    depends_on:
      posthog-zookeeper:
        condition: service_healthy
    environment:
      - CLICKHOUSE_DB=posthog
      - CLICKHOUSE_SKIP_USER_SETUP=1
      # CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT intentionally omitted: when set to 1 it creates
      # the default user via SQL (GRANT ALL ON *.*), which excludes NAMED COLLECTION and makes
      # XML <grants> (in users.d/) ineffective for that user. Without it, the default user is
      # XML-managed; users.xml already provides access_management=1 so PostHog user init still works.
    volumes:
      - posthog_clickhouse_data:/var/lib/clickhouse
      - ./posthog/clickhouse-config.xml:/etc/clickhouse-server/config.d/posthog.xml:ro
      - ./posthog/clickhouse-users.xml:/etc/clickhouse-server/users.d/localcloud-grants.xml:ro
    networks:
      - lck-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - 'http://localhost:8123/ping' | grep -q 'Ok.'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  posthog-kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
    container_name: localcloud-posthog-kafka
    profiles: ["posthog"]
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://posthog-kafka:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://posthog-kafka:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr posthog-kafka:33145
      - --advertise-rpc-addr posthog-kafka:33145
      - --mode dev-container
      - --smp 2
      - --memory 3G
      - --reserve-memory 500M
      - --overprovisioned
      - --set redpanda.empty_seed_starts_cluster=false
      - --seeds posthog-kafka:33145
      - --set redpanda.auto_create_topics_enabled=true
    environment:
      - ALLOW_PLAINTEXT_LISTENER=true
      # Hobby: keep logs for 1 hour to reduce local disk usage
      - KAFKA_LOG_RETENTION_MS=3600000
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
      - KAFKA_LOG_RETENTION_HOURS=1
    volumes:
      - posthog_kafka_data:/var/lib/redpanda/data
    networks:
      - lck-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9644/v1/status/ready || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  posthog-kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
    container_name: localcloud-posthog-kafka-init
    profiles: ["posthog"]
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for Kafka broker..."
        until rpk topic list --brokers posthog-kafka:9092 2>/dev/null; do
          sleep 2
        done
        echo "Creating required PostHog topics..."
        for topic in exceptions_ingestion clickhouse_events_json; do
          rpk topic create "$$topic" --brokers posthog-kafka:9092 -p 1 -r 1 2>&1 || true
        done
        echo "Topics ready."
    depends_on:
      posthog-kafka:
        condition: service_healthy
    networks:
      - lck-network
    restart: "no"

  # Create system.crash_log so PostHog's migrate_clickhouse can create the custom_metrics_server_crash view.
  # ClickHouse only creates this table on fatal crash; PostHog expects it to exist.
  posthog-clickhouse-crash-log-init:
    image: clickhouse/clickhouse-server:25.10
    container_name: localcloud-posthog-clickhouse-crash-log-init
    profiles: ["posthog"]
    entrypoint: ["/usr/bin/clickhouse-client"]
    command:
      - --host=posthog-clickhouse
      - --query=CREATE TABLE IF NOT EXISTS system.crash_log (build_id String, revision UInt32, version String, trace_full Array(String), trace Array(UInt64), query_id String, thread_id UInt64, signal Int32, timestamp_ns UInt64, event_time DateTime, event_date Date, hostname LowCardinality(String)) ENGINE = MergeTree() ORDER BY (event_date, hostname)
    depends_on:
      posthog-clickhouse:
        condition: service_healthy
    networks:
      - lck-network
    restart: "no"

  posthog-db-migrate:
    image: posthog/posthog:latest
    container_name: localcloud-posthog-db-migrate
    profiles: ["posthog"]
    command: python manage.py migrate --no-input
    environment:
      - DATABASE_URL=postgres://posthog:posthog@posthog-postgres:5432/posthog
      - REDIS_URL=redis://posthog-redis:6379/
      - CLICKHOUSE_HOST=posthog-clickhouse
      - CLICKHOUSE_DATABASE=posthog
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_API_USER=api
      - CLICKHOUSE_API_PASSWORD=apipass
      - CLICKHOUSE_APP_USER=app
      - CLICKHOUSE_APP_PASSWORD=apppass
      - CLICKHOUSE_SECURE=false
      - CLICKHOUSE_VERIFY=false
      - KAFKA_HOSTS=posthog-kafka:9092
      - PRIMARY_DB=clickhouse
      - SECRET_KEY=localcloud-posthog-secret-key-change-me
      - SITE_URL=https://posthog.localcloudkit.com:${APP_PORT:-3030}
      - DEPLOYMENT=hobby
      - OBJECT_STORAGE_ENABLED=false
      - CLICKHOUSE_REPLICATION=false
      - OTEL_SDK_DISABLED=true
      - DISABLE_SECURE_SSL_REDIRECT=true
    depends_on:
      posthog-postgres:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_healthy
      posthog-zookeeper:
        condition: service_healthy
      posthog-kafka:
        condition: service_healthy
    networks:
      - lck-network
    restart: "no"

  posthog-web:
    image: posthog/posthog:latest
    container_name: localcloud-posthog-web
    profiles: ["posthog"]
    # Run only the web server (Unit/Granian); default ./bin/docker also starts ./bin/docker-worker
    # (Node) which fails with "Cannot find module '/code/nodejs/dist/index.js'" in posthog/posthog:latest.
    command: ["./bin/docker-server"]
    environment:
      - DATABASE_URL=postgres://posthog:posthog@posthog-postgres:5432/posthog
      - REDIS_URL=redis://posthog-redis:6379/
      - CLICKHOUSE_HOST=posthog-clickhouse
      - CLICKHOUSE_DATABASE=posthog
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_API_USER=api
      - CLICKHOUSE_API_PASSWORD=apipass
      - CLICKHOUSE_APP_USER=app
      - CLICKHOUSE_APP_PASSWORD=apppass
      - CLICKHOUSE_SECURE=false
      - CLICKHOUSE_VERIFY=false
      - KAFKA_HOSTS=posthog-kafka:9092
      - PRIMARY_DB=clickhouse
      - SECRET_KEY=localcloud-posthog-secret-key-change-me
      - SITE_URL=https://posthog.localcloudkit.com:${APP_PORT:-3030}
      - IS_BEHIND_PROXY=true
      - TRUSTED_PROXIES=*
      - SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https
      - POSTHOG_SKIP_MIGRATION_CHECKS=1
      - SKIP_ASYNC_MIGRATIONS_SETUP=1
      - DEPLOYMENT=hobby
      - OBJECT_STORAGE_ENABLED=false
      - CLICKHOUSE_REPLICATION=false
      - OTEL_SDK_DISABLED=true
      - DISABLE_SECURE_SSL_REDIRECT=true
      - FLAGS_REDIS_ENABLED=false
    depends_on:
      posthog-postgres:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_healthy
      posthog-clickhouse-crash-log-init:
        condition: service_completed_successfully
      posthog-kafka:
        condition: service_healthy
      posthog-kafka-init:
        condition: service_completed_successfully
      posthog-db-migrate:
        condition: service_completed_successfully
    networks:
      - lck-network
    restart: unless-stopped
    healthcheck:
      # Require HTTP 200 only; body format may vary by PostHog version. start_period allows migrations to finish.
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:8000/_health/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.posthog.rule=Host(`posthog.localcloudkit.com`)"
      - "traefik.http.routers.posthog.entrypoints=websecure"
      - "traefik.http.routers.posthog.tls=true"
      - "traefik.http.services.posthog.loadbalancer.server.port=8000"

  posthog-worker:
    image: posthog/posthog:latest
    container_name: localcloud-posthog-worker
    profiles: ["posthog"]
    command: ./bin/docker-worker-celery --with-scheduler
    environment:
      - DATABASE_URL=postgres://posthog:posthog@posthog-postgres:5432/posthog
      - REDIS_URL=redis://posthog-redis:6379/
      - CLICKHOUSE_HOST=posthog-clickhouse
      - CLICKHOUSE_DATABASE=posthog
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_API_USER=api
      - CLICKHOUSE_API_PASSWORD=apipass
      - CLICKHOUSE_APP_USER=app
      - CLICKHOUSE_APP_PASSWORD=apppass
      - CLICKHOUSE_SECURE=false
      - CLICKHOUSE_VERIFY=false
      - KAFKA_HOSTS=posthog-kafka:9092
      - PRIMARY_DB=clickhouse
      - SECRET_KEY=localcloud-posthog-secret-key-change-me
      - SITE_URL=https://posthog.localcloudkit.com:${APP_PORT:-3030}
      - IS_BEHIND_PROXY=true
      - TRUSTED_PROXIES=*
      - DEPLOYMENT=hobby
      - OBJECT_STORAGE_ENABLED=false
      - POSTHOG_SKIP_MIGRATION_CHECKS=1
      - CLICKHOUSE_REPLICATION=false
      - OTEL_SDK_DISABLED=true
      - DISABLE_SECURE_SSL_REDIRECT=true
      - FLAGS_REDIS_ENABLED=false
    depends_on:
      posthog-web:
        condition: service_healthy
    networks:
      - lck-network
    restart: unless-stopped

  # posthog-plugin-server removed: ./bin/plugin-server no longer ships in posthog/posthog:latest
  # The plugin server (now "CDP worker") is not required for core analytics functionality

networks:
  lck-network:
    driver: bridge

volumes:
  aws_emulator_data:
  localcloud-data:
  postgres_data:
  posthog_postgres_data:
  posthog_redis_data:
  posthog_clickhouse_data:
  posthog_kafka_data:
  posthog_zookeeper_data:
  posthog_zookeeper_datalog:
  posthog_zookeeper_logs:
